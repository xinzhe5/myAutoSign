<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号自动识别</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <main class="panel">
    <header class="panel-header">
      <div>
        <h1>账号自动识别</h1>
        <p>在目标站点登录后，从这里识别并保存账号。</p>
      </div>
      <button id="open-options" type="button" class="icon-button" title="打开完整设置">设置</button>
    </header>

    <section class="current-site">
      <span>当前站点</span>
      <strong id="current-site-url">正在读取...</strong>
    </section>

    <section id="sidepanel-home" class="home-view">
      <div class="section-title">
        <h2>账号信息</h2>
        <button id="add-account-button" type="button">新增账号</button>
      </div>
      <div id="sidepanel-account-list" class="account-list"></div>
      <p id="sidepanel-account-empty" class="empty-state" hidden>还没有保存账号。点击“新增账号”后可自动识别或手动添加。</p>
    </section>

    <section id="add-mode-panel" class="mode-panel" hidden>
      <div class="section-title">
        <h2>新增账号</h2>
        <button id="cancel-add-mode" type="button" class="secondary-button">返回</button>
      </div>
      <div class="mode-actions">
        <button id="auto-add-button" type="button" class="mode-button primary-mode">
          <strong>自动添加</strong>
          <small>请先在目标站点登录，进入后点击按钮识别并补全账号信息。</small>
        </button>
        <button id="manual-add-button" type="button" class="mode-button">
          <strong>手动添加</strong>
          <small>手动填写账号信息，适合自动识别失败或需要自行维护令牌的站点。</small>
        </button>
      </div>
    </section>

    <form id="sidepanel-form" class="form" hidden>
      <div class="form-title">
        <h2 id="form-title">新增账号</h2>
        <button id="back-to-home" type="button" class="secondary-button">返回</button>
      </div>
      <label>
        <span>站点地址</span>
        <input id="base-url" type="url" placeholder="https://example.com" required>
      </label>

      <div class="two-col">
        <label>
          <span>站点类型</span>
          <select id="site-type">
            <option value="new-api">New API</option>
            <option value="anyrouter">AnyRouter</option>
          </select>
        </label>
        <label>
          <span>认证方式</span>
          <select id="auth-type">
            <option value="access-token">Access Token</option>
            <option value="cookie">Cookie</option>
          </select>
        </label>
      </div>

      <label>
        <span>站点名称</span>
        <input id="name" type="text" placeholder="主站">
      </label>
      <label>
        <span>用户名</span>
        <input id="username" type="text" autocomplete="off">
      </label>
      <label>
        <span>用户 ID</span>
        <input id="user-id" type="text" autocomplete="off" required>
      </label>
      <label id="access-token-field">
        <span>Access Token</span>
        <div class="secret-input">
          <input id="access-token" type="password" autocomplete="off">
          <button
            type="button"
            class="secret-toggle"
            data-secret-toggle="#access-token"
            data-secret-label="Access Token"
            aria-label="显示 Access Token"
            aria-pressed="false"
            title="显示 Access Token"
          ></button>
        </div>
      </label>
      <label id="cookie-field">
        <span>Cookie</span>
        <textarea id="cookie" rows="3" spellcheck="false"></textarea>
      </label>
      <label id="turnstile-field">
        <span>Turnstile Token（可选）</span>
        <div class="secret-input">
          <input id="turnstile-token" type="password" autocomplete="off">
          <button
            type="button"
            class="secret-toggle"
            data-secret-toggle="#turnstile-token"
            data-secret-label="Turnstile Token"
            aria-label="显示 Turnstile Token"
            aria-pressed="false"
            title="显示 Turnstile Token"
          ></button>
        </div>
      </label>

      <div class="switches">
        <label><input id="enabled" type="checkbox" checked> 启用账号</label>
        <label><input id="auto-checkin-enabled" type="checkbox" checked> 参与自动签到</label>
      </div>

      <div class="actions">
        <button id="detect-button" type="button" class="secondary-button">自动识别当前站点</button>
        <button type="submit">保存账号</button>
      </div>
    </form>

    <p id="status" class="status" aria-live="polite"></p>
  </main>

  <script src="shared.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
